<!DOCTYPE html>
<html>
    <body>
        <h2>Java Script Arrays</h2> <!--Heading-->
        <p>Compute the sum of the rounded numbers in an array</p> <!--Describes what the purpose of the function is-->
        <p id="demo"></p>  <!--Initialize the paragraph that will hold the result-->
        <script>
            const numbers = [15.5,2.3,1.1,4.7]; //initialize the array
            // document.getElementById("demo").innerHTML = numbers.reduce(getSum, 0);  //the result of the reduce method that sums
            //                                                                         //all the elements in the array is inserted into
            //                                                                         //the paragraphj labeled demo
            //                                                                         //reduce current value is set to 0

            document.getElementById("demo").innerHTML = numbers.reduce(getSum);  //reduce current value is set to the first element
                                                                                //this causes the function to not return a whole number
            function getSum(total, num) {      //define the sum function
                return total + Math.round(num); //returns the total of the rounded array elements
            }
        </script>
    </body>
</html>
