<!DOCTYPE html>
<html>
    <title>Assignment 2</title>
    <header> Assignment 2</header>
    <body>
        <tag>Looping a triangle</tag>
        <pre id="2.1"></pre>
    <script>

        var triangle = "";
        for (let i = 1; i <= 10; i++) {
 
            for (let j = 1; j <= i; j++) {
                triangle += "x";
            }

            triangle += "\n";
        }
        document.getElementById("2.1").textContent = triangle;
    </script>

        <tag>Fizz Buzz</tag>
        <pre id="2.2"></pre>
        <script>
            function FizzBuzz(num) {
                if ((num % 7 == 0) && (num % 4 == 0)) {
                    return "Divisible by both 7 and 4";
                }
                else if (num % 4 == 0) {
                    return "Divisible by 4";
                }

                else if ((num % 7 == 0) && !(num % 4 == 0)) {
                    return "Divisible by 7";
                }

                else {
                    return num;
                }
            }

            let output = "";

            for (let i = 1; i <= 100; i++) {
                output += FizzBuzz(i) + "<br>";
            }

            document.getElementById("2.2").innerHTML = output;
        </script>
    </body>
</html>
