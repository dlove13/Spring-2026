<script>
    class Group {
        constructor() {

            this.group = [];        //create an empty group
            
        }

        add(value) {                        //adds a value to the group if it doesn't already exist
            if (!this.has(value)) {
                this.group.push(value);         
            }
            else {
                return 1;        
            }
        }

        delete(value) {
            const index = this.group.indexOf(value);    //finds the index of the desired value

            if (this.has(value)) {                      //if it exists in the group, then delete it
                this.group.splice(index, 1);
                return true;
            }
            return false;                               //otherwise the group stays the same
        }

        has(value) {
            return this.group.includes(value);          //checks if a value exists in the group
        }


        union(argument) {
            const unionGroup = new Group;               //create new group to hold the union set
            
            for (let i = 0; i < this.group.length; i++) {       //checks each value in the initial group and adds it to the union set
                unionGroup.add(this.group[i]);  
            }

            for (let j = 0; j < argument.group.length; j++) {   //checks each value in the argument group and adds it to the union set,
                unionGroup.add(argument.group[j]);                 //if they don't already exist
            }

            return unionGroup.group;
        }

        intersection(argument) {
            const intersectGroup = new Group;                   //create new group to hold intersection set

            for (let i = 0; i < this.group.length; i++) {       //checks if both sets contain the same value, if true, then add it to
                if (argument.has(this.group[i])) {              //the intersection set
                    intersectGroup.add(this.group[i]);
                }
            }
            return intersectGroup.group;
        }

        difference(argument) {
            const differenceGroup = new Group;              //create new group to hold the difference set

            for (let i = 0; i < this.group.length; i++) {   //checks if the value in the argument set does not exist in the initial set
                if (!argument.has(this.group[i])) {         //if true, then add value to the difference
                    differenceGroup.add(this.group[i]);
                }
            }
            return differenceGroup.group;
        }
    }
     //Test Cases

     //Create two groups
     let group1 = new Group();
     let group2 = new Group();

     group1.add(1);  //1, 2, 3
     group1.add(2);
     group1.add(3);
     group1.add(4);
     group1.add("4");
     group2.add(2); //2,3,5
     group2.add(3);
     group2.add(5);
     group2.add(2);

     //Display groups' contents
     document.getElementById("Group 1").innerHTML = "Contents of group 1: " + group1.group + "<br>";
     document.getElementById("Group 2").innerHTML = "Contents of group 2 : " + group2.group + "<br>";
    
     //has operations
     document.getElementById("has 5").innerHTML = "Does group 1 have a 5?: " + group1.has(5) + "<br>"; //return false
     document.getElementById("has 3").innerHTML = "Does group 2 have a 3?: " + group2.has(3) + "<br>"; //return true

     //Union Operations
     document.getElementById("1 union 2").innerHTML = "Group 1 Union Group 2: " + group1.union(group2) + "<br>"; //1,2,3,5
     
     //Intersection
     document.getElementById("1 intersection 2").innerHTML = "Group 1 Intersection Group 2: " + group1.intersection(group2) + "<br>"; //2,3
 
     //Difference
     document.getElementById("1 difference 2").innerHTML = "Group 1 Difference Group 2: " + group1.difference(group2) + "<br>"; //1

     //Groups after deleting element
     group1.delete(1);   //element exists
     group2.delete(1);     //element does not exist
     
     document.getElementById("Group 1 delete").innerHTML = "Delete 1 from Group 1: " + group1.group + "<br>";
     document.getElementById("Group 2 delete").innerHTML = "Delete 1 from Group 2 (doesn't exist) : " + group2.group + "<br>";




    
    
    


        


</script>
