    <script>

        function asTabs(node)
        {
            //Initialize the HTMLCollections
            const tabs = document.getElementsByTagName("div");
            const buttons = document.getElementsByTagName("button");

            ///Disable tab content
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].style.display = "none";
            }
            
            //Set Default button Colors
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].style.color = "blue";
            }

            //Find and display the active tab
            for (let i = 0; i < tabs.length; i++) {
                if (tabs[i].dataset.tabname === node) {
                    tabs[i].style.display = 'block';
                    break;
                }
            }

            //Highlight current button in red
            for (let i = 0; i < buttons.length; i++) {
                if (buttons[i].textContent === node) {
                    buttons[i].style.color = "red";
                    break;
                }
            }
        }
        
        //Default tab upon open webpage
        asTabs('Rock');

    </script>
